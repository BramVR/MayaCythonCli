name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install project and dev tools
        run: python -m pip install -e .[dev]

      - name: Lint
        run: python -m ruff check src tests

      - name: Type check
        run: python -m mypy src tests

      - name: Unit tests
        run: python -m unittest discover -s tests

      - name: Installed CLI verify
        run: python -m maya_cython_compile --repo-root . --target windows-2025 verify --scenario installed-cli-config-show --json --json-errors

      - name: Upload verify artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: agent-runs
          path: build/agent-runs/
          if-no-files-found: ignore
